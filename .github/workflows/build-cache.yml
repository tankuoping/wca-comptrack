name: Build WCA Cache

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  build-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build WCIF cache
        run: node scripts/build-cache.js

      - name: Commit and push cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/wcif-cache.json
          git diff --staged --quiet || git commit -m "chore: update wcif cache [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
