name: Build WCA Cache

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  build-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install google-spreadsheet google-auth-library nodemailer uuid

      - name: Build WCIF cache
        run: node scripts/build-cache.js

      - name: Send competition alerts
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: node scripts/send-alerts.js

      - name: Commit and push cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/wcif-cache.json public/wcif-cache-prev.json
          git diff --staged --quiet || git commit -m "chore: update wcif cache [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
